# DocuFlow — full development stack.
# Browse http://localhost (via Nginx). Vite is also exposed directly on :5173.

# Backend and worker run the same image and the same env; only the command and
# RUN_MIGRATIONS differ. Anchors keep the two definitions from drifting apart.
x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG}
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,nginx
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  # Service names, not localhost — these override the host-oriented .env values.
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET_NAME: ${S3_BUCKET_NAME}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  EXTRACTOR_BACKEND: ${EXTRACTOR_BACKEND}

x-backend-depends: &backend-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: docuflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: docuflow-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: docuflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: docuflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the documents bucket, then exits. Safe to re-run.
  minio-init:
    image: minio/mc:latest
    container_name: docuflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${S3_BUCKET_NAME} &&
      echo 'bucket ready: ${S3_BUCKET_NAME}'
      "

  backend:
    build: ./backend
    container_name: docuflow-backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "1"
    volumes:
      - ./backend:/app        # live reload on edit
      - /app/.venv            # keep the host venv out of the container
    ports:
      - "8000:8000"
    depends_on: *backend-depends
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build: ./backend
    container_name: docuflow-worker
    command: celery -A config worker -l info
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "0"   # the API owns migrations; workers must not race it
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      <<: *backend-depends
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: docuflow-frontend
    command: npm run dev -- --host
    environment:
      # Bind mounts don't emit inotify events on Windows; polling is the fix.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules   # container's install wins over the host's
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: docuflow-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
